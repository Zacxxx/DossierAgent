[project]
name = "dossieragent-core"
version = "0.1.0"
description = "Tiny composition core for DossierAgent packages."
requires-python = ">=3.12"
dependencies = [
  "dossieragent-agent",
  "dossieragent-browser",
  "dossieragent-database",
  "dossieragent-processing",
  "dossieragent-schedule",
  "dossieragent-search-engine",
  "cryptography>=42",
  "fastapi>=0.115",
  "httpx>=0.27",
  "python-multipart>=0.0.9",
  "uvicorn[standard]>=0.32",
]

[tool.uv.sources]
dossieragent-agent = { workspace = true }
dossieragent-browser = { workspace = true }
dossieragent-database = { workspace = true }
dossieragent-processing = { workspace = true }
dossieragent-schedule = { workspace = true }
dossieragent-search-engine = { workspace = true }

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[dependency-groups]
dev = [
    "pytest>=8.3",
]

[tool.setuptools.packages.find]
where = ["src"]
