<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DossierAgent</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f7f8fa;
        color: #17202a;
      }

      body {
        margin: 0;
      }

      main {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 240px minmax(0, 1fr) 320px;
      }

      aside,
      section {
        border-right: 1px solid #d9dee7;
      }

      aside,
      section,
      .context {
        padding: 24px;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        font-size: 22px;
        margin-bottom: 28px;
      }

      h2 {
        font-size: 15px;
        margin-bottom: 12px;
      }

      nav,
      .grid,
      .stack,
      .listing-list {
        display: grid;
        gap: 8px;
      }

      .grid {
        gap: 16px;
        margin-top: 24px;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }

      nav span,
      .panel,
      .status-row,
      .metric,
      .listing {
        border: 1px solid #d9dee7;
        background: #ffffff;
        border-radius: 8px;
      }

      nav span,
      .status-row,
      .metric,
      .listing {
        padding: 10px 12px;
        font-size: 14px;
      }

      .command {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #b7c0cf;
        border-radius: 8px;
        padding: 14px 16px;
        font: inherit;
        background: #ffffff;
      }

      .panel {
        padding: 16px;
      }

      .status-row {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 8px;
      }

      .metric strong,
      .listing strong {
        display: block;
        font-size: 20px;
        margin-top: 4px;
      }

      .listing strong {
        font-size: 15px;
      }

      .muted {
        color: #667085;
      }

      .ok {
        color: #0d7a4f;
        font-weight: 650;
      }

      .pending {
        color: #8a5a00;
        font-weight: 650;
      }

      .error {
        color: #b42318;
        font-weight: 650;
      }

      @media (max-width: 900px) {
        main,
        .metric-grid {
          grid-template-columns: 1fr;
        }

        aside,
        section {
          border-right: 0;
          border-bottom: 1px solid #d9dee7;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <aside>
        <h1>DossierAgent</h1>
        <nav>
          <span>Dashboard</span>
          <span>Veilles</span>
          <span>Annonces</span>
          <span>Dossier</span>
          <span>Paquets</span>
          <span>Historique</span>
        </nav>
      </aside>

      <section>
        <h2>Commande</h2>
        <input class="command" aria-label="Commande agent" />

        <div class="grid">
          <div class="panel">
            <h2>Tableau de bord</h2>
            <div id="dashboard-state" class="status-row">
              <span>API</span>
              <span class="pending">loading</span>
            </div>
            <div class="metric-grid">
              <div class="metric">
                <span class="muted">Veille active</span>
                <strong id="watch-name">-</strong>
              </div>
              <div class="metric">
                <span class="muted">Dernier run</span>
                <strong id="run-status">-</strong>
              </div>
              <div class="metric">
                <span class="muted">Score dossier</span>
                <strong id="dossier-score">-</strong>
              </div>
              <div class="metric">
                <span class="muted">Checks</span>
                <strong id="pending-checks">-</strong>
              </div>
            </div>
          </div>

          <div class="panel">
            <h2>Run</h2>
            <div id="run-stats" class="stack"></div>
          </div>

          <div class="panel">
            <h2>Recommandations</h2>
            <div id="recommended-listings" class="listing-list"></div>
          </div>
        </div>
      </section>

      <div class="context">
        <h2>Contexte</h2>
        <div class="status-row">
          <span>Prochain scan</span>
          <span id="next-run">-</span>
        </div>
        <div class="status-row">
          <span>Notifications</span>
          <span id="notifications">-</span>
        </div>
        <div class="status-row">
          <span>Pieces manquantes</span>
          <span id="missing-docs">-</span>
        </div>
      </div>
    </main>

    <script>
      const apiBase = "http://127.0.0.1:8000/api/v1";
      const currency = new Intl.NumberFormat("fr-FR", {
        style: "currency",
        currency: "EUR",
        maximumFractionDigits: 0,
      });

      async function loadDashboard() {
        const state = document.querySelector("#dashboard-state");
        try {
          const response = await fetch(`${apiBase}/dashboard`);
          const payload = await response.json();
          if (!response.ok) throw payload;
          renderDashboard(payload);
          state.innerHTML = '<span>API</span><span class="ok">connected</span>';
        } catch (error) {
          state.innerHTML =
            '<span>API</span><span class="error">run bun run seed, then bun run dev</span>';
        }
      }

      function renderDashboard(payload) {
        document.querySelector("#watch-name").textContent = payload.current_watch.name;
        document.querySelector("#run-status").textContent = payload.latest_run.status;
        document.querySelector("#dossier-score").textContent =
          `${payload.dossier.readiness_score}%`;
        document.querySelector("#pending-checks").textContent = payload.pending_checks;
        document.querySelector("#next-run").textContent = formatDate(payload.current_watch.next_run_at);
        document.querySelector("#notifications").textContent = payload.notifications_unread;
        document.querySelector("#missing-docs").textContent =
          payload.dossier.missing_docs.length === 0
            ? "0"
            : payload.dossier.missing_docs.join(", ");

        document.querySelector("#run-stats").innerHTML = Object.entries(payload.latest_run.stats)
          .map(([key, value]) => `<div class="status-row"><span>${label(key)}</span><span>${value}</span></div>`)
          .join("");

        document.querySelector("#recommended-listings").innerHTML = payload.recommended_listings
          .map(
            (listing) => `
              <div class="listing">
                <span class="muted">${listing.district} · ${listing.surface} m2 · ${currency.format(listing.price)}</span>
                <strong>${listing.title}</strong>
                <span class="ok">${listing.fit_score}</span>
              </div>
            `,
          )
          .join("");
      }

      function label(value) {
        return value.replaceAll("_", " ");
      }

      function formatDate(value) {
        if (!value) return "-";
        return new Date(value).toLocaleString("fr-FR", {
          dateStyle: "short",
          timeStyle: "short",
        });
      }

      loadDashboard();
    </script>
  </body>
</html>
