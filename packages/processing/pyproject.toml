[project]
name = "dossieragent-processing"
version = "0.1.0"
description = "Deterministic processing package for DossierAgent."
requires-python = ">=3.12"
dependencies = [
  "pymupdf>=1.24,<2",
]

[build-system]
requires = ["setuptools>=69"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
